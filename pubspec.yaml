name: agrogeo_brasil_app_main
description: "App oficial da AGROGEO BRASIL"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase (versões compatíveis entre si com firebase_core 2.x)
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  firebase_messaging: ^14.9.4
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.6.6

  # Utilitários
  shared_preferences: ^2.2.3
  mask_text_input_formatter: ^2.5.0
  url_launcher: ^6.2.5
  intl: ^0.20.2
  path_provider: ^2.1.2
  dio: ^5.4.0
  open_filex: ^4.3.2
  permission_handler: ^11.3.0

  # Notificações locais (corrigido para versão compatível com Android API 33+)
  flutter_local_notifications: ^19.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
